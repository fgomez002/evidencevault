name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  EXPO_PUBLIC_REVENUECAT_IOS_KEY: ${{ secrets.REVENUECAT_IOS_KEY }}
  EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: ${{ secrets.REVENUECAT_ANDROID_KEY }}

jobs:
  build-ios:
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Authenticate with EAS
        run: eas login --non-interactive
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build iOS
        run: eas build --platform ios --non-interactive

      - name: Upload iOS build
        uses: actions/upload-artifact@v3
        with:
          name: ios-build
          path: |
            **/*.ipa
            **/*.app

  build-android:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Authenticate with EAS
        run: eas login --non-interactive
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build Android
        run: eas build --platform android --non-interactive

      - name: Upload Android build
        uses: actions/upload-artifact@v3
        with:
          name: android-build
          path: |
            **/*.apk
            **/*.aab

  notify:
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]
    if: always() && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Notify build status
        run: |
          echo "Build for tag ${{ github.ref_name }} completed"
          echo "iOS: ${{ needs.build-ios.result }}"
          echo "Android: ${{ needs.build-android.result }}"
