name: Preview Deploy

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run typecheck
          npm run lint --if-present

      - name: Generate preview QR code
        id: preview
        run: |
          echo "PREVIEW_URL=https://exp.host/@example/evidencevault?sdkVersion=51.0.0" >> $GITHUB_OUTPUT
          echo "PREVIEW_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Comment PR with preview link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = '${{ steps.preview.outputs.PREVIEW_URL }}';
            const previewTime = '${{ steps.preview.outputs.PREVIEW_TIME }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📱 Expo Preview\n\n**Time:** ${previewTime}\n\n### To test this PR:\n\n1. Install [Expo Go](https://expo.dev/client) on your iOS/Android device\n2. Scan this QR code or visit: ${previewUrl}\n\n**Note:** Some features (IAP, biometrics) require a full dev build. See [CONTRIBUTING.md](CONTRIBUTING.md) for more.\n`
            });
